# Token strings embedded via OpenAI API (cached to parquet after first run).

# provider: openai | azure
embeddings:
  provider: azure
  model: text-embedding-3-small
  azure_deployment: text-embedding-3-small
  dimensions: 256
  batch_size: 128

# RAG: source = yaml (demo) | canvas (PDFs) | github_book (Quarto .qmd, recommended)
rag:
  enabled: true
  source: github_book
  corpus_file: rag_corpus.yaml
  queries_file: rag_queries.yaml
  recall_k: 3
  chunk_chars: 900
  chunk_overlap: 120
  github_book:
    owner: wanghemath
    repo: Book-AdvancedLinearAlgebraAI
    branch: main
    chapters_dir: chapters
  canvas:
    course_id: null

